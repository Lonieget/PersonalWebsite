<section id="portfolio" class="portfolio">
  <div class="container">
    <div class="portfolio-header">
      <p class="section-label">{{ langService.translate('portfolio.label') }}</p>
      <h2 class="section-heading">{{ langService.translate('portfolio.heading') }}</h2>
    </div>

    <div class="project-grid">
      <div *ngFor="let p of projects" class="project-card">
        <div class="project-img-wrapper">
          <img [src]="p.img" [alt]="langService.translate(p.titleKey)" class="project-img">
        </div>
        <div class="project-info">
          <a [href]="p.link" target="_blank" [attr.disabled]="!p.link ? true : null">
            <div class="tech-container">
              <span *ngFor="let tech of p.tech.split(' / ')" class="tech-tag">{{ tech }}</span>
            </div>
            <h3>{{ langService.translate(p.titleKey) }}</h3>
            <p>{{ langService.translate(p.descriptionKey) }}</p>
          </a>
        </div>
      </div>
    </div>
  </div>
</section>
