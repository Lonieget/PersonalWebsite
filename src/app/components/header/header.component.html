<header class="glass-header" [class.scrolled]="isScrolled">
  <div class="container header-content">
    <a href="#home" class="logo">Lonie</a>
    <nav>
      <ul class="nav-links">
        <li><a href="#home">{{ langService.translate('nav.home') }}</a></li>
        <li><a href="#portfolio">{{ langService.translate('nav.portfolio') }}</a></li>
        <li><a href="#about">{{ langService.translate('nav.about') }}</a></li>
        <li><a href="#skills">{{ langService.translate('nav.skills') }}</a></li>
        <li class="nav-cta"><a href="#contact" class="btn-primary btn-sm">{{ langService.translate('nav.contact') }}</a></li>
        
        <!-- Language Toggle -->
        <li class="lang-toggle">
          <button mat-icon-button [matMenuTriggerFor]="langMenu" aria-label="Toggle language">
            <mat-icon>language</mat-icon>
          </button>
          <mat-menu #langMenu="matMenu" xPosition="before" class="custom-lang-menu">
            <button mat-menu-item (click)="langService.setLanguage('en')" [class.active]="langService.currentLanguage() === 'en'">
              <span>English</span>
            </button>
            <button mat-menu-item (click)="langService.setLanguage('zh')" [class.active]="langService.currentLanguage() === 'zh'">
              <span>繁體中文</span>
            </button>
          </mat-menu>
        </li>
      </ul>
    </nav>
  </div>
</header>
